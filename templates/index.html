{% extends "base.html" %}

{% block title %}{{ config.title }}{% endblock title %}

{% block content %}
<section class="home-products">
    <div class="product-grid">
        <a href="{{ get_url(path='/pentesting/') }}" class="product-card">
            <div class="product-icon">
                <img src="https://api.iconify.design/game-icons:fizzing-flask.svg?color=%232496ED" width="36"
                    height="36" alt="pentesting">
            </div>
            <h3 class="product-title">pentesting</h3>
            <p class="product-desc">Autonomous Offensive Security AI</p>
        </a>
        <a href="{{ get_url(path='/opencode-orchestrator/') }}" class="product-card">
            <div class="product-icon">
                <img src="{{ get_url(path='assets/img/opencode-logo.png') }}" width="36" height="36"
                    alt="OpenCode Orchestrator" style="object-fit: contain;">
            </div>
            <h3 class="product-title">OpenCode Orchestrator</h3>
            <p class="product-desc">Parallel Orchestration Engine</p>
        </a>
        <a href="{{ get_url(path='/studynote/') }}" class="product-card">
            <div class="product-icon">
                <img src="https://api.iconify.design/lucide:book-open.svg?color=%23f59e0b" width="36" height="36"
                    alt="Study">
            </div>
            <h3 class="product-title">Study Notes</h3>
            <p class="product-desc">Deep Dives & Research</p>
        </a>
    </div>
</section>
{% endblock content %}
