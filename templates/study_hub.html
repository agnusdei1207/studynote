{% extends "base.html" %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ get_url(path='/') }}">root</a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current">Study Notes</span>
</div>

<div class="study-hub">

    <a class="study-hub-card" href="{{ get_url(path='/pe_exam/') }}">
        <div class="shc-icon">
            <img src="https://api.iconify.design/lucide:award.svg?color=%23f59e0b" width="32" height="32" alt="">
        </div>
        <div class="shc-body">
            <div class="shc-title">PE</div>
            <div class="shc-desc">9과목 핵심 정리</div>
        </div>
        <img class="shc-arrow" src="https://api.iconify.design/lucide:arrow-right.svg?color=%23888" width="18"
            height="18" alt="">
    </a>

    <a class="study-hub-card" href="{{ get_url(path='/study/') }}">
        <div class="shc-icon">
            <img src="https://api.iconify.design/lucide:book-open.svg?color=%2310b981" width="32" height="32" alt="">
        </div>
        <div class="shc-body">
            <div class="shc-title">일반 학습</div>
            <div class="shc-desc">ETC</div>
        </div>
        <img class="shc-arrow" src="https://api.iconify.design/lucide:arrow-right.svg?color=%23888" width="18"
            height="18" alt="">
    </a>

</div>

<style>
    .study-hub {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: 2rem;
        max-width: 640px;
    }

    .study-hub-card {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        padding: 1.5rem 1.75rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--bg-card);
        color: var(--text-primary);
        text-decoration: none;
        transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .study-hub-card:hover {
        border-color: var(--accent);
        background: var(--bg-card-hover, var(--bg-card));
        transform: translateY(-2px);
    }

    .shc-icon {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: var(--bg-void, rgba(0, 0, 0, 0.2));
    }

    .shc-body {
        flex: 1;
    }

    .shc-title {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.25rem;
    }

    .shc-desc {
        font-size: 0.875rem;
        color: var(--text-secondary);
    }

    .shc-arrow {
        flex-shrink: 0;
        transition: transform 0.15s, opacity 0.15s;
        opacity: 0.5;
    }

    .study-hub-card:hover .shc-arrow {
        transform: translateX(4px);
        opacity: 1;
    }
</style>
{% endblock content %}
